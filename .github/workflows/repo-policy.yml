name: Repo Policy

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    name: Branch Name
    runs-on: ubuntu-latest
    steps:
      - name: Validate branch name
        shell: bash
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          pattern='^((feat|fix|chore|docs|refactor|test|ci|build|style|perf|revert|release)\/[a-z0-9][a-z0-9._/-]*|(dependabot|renovate)\/.+)$'
          if [[ "$BRANCH_NAME" =~ $pattern ]]; then
            echo "Branch name OK: $BRANCH_NAME"
            exit 0
          fi

          echo "Invalid branch name: $BRANCH_NAME"
          echo "Expected: <type>/<slug>, for example feat/search-api"
          exit 1

  pr-title:
    name: PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            build
            style
            perf
            revert

  commits:
    name: Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: .commitlintrc.yml
