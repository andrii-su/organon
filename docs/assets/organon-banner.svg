<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8d0ef"/>
      <stop offset="100%" stop-color="#ede8f5"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(26,19,32,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg-grad)"/>
  <rect width="1280" height="640" fill="url(#grid)"/>

  <!-- Top / Bottom border -->
  <rect x="0" y="0" width="1280" height="2.5" fill="rgba(26,19,32,0.82)"/>
  <rect x="0" y="637.5" width="1280" height="2.5" fill="rgba(26,19,32,0.82)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="7" height="640" fill="#6d28d9"/>

  <!-- Vertical divider left | right -->
  <line x1="755" y1="0" x2="755" y2="640" stroke="rgba(26,19,32,0.82)" stroke-width="1.5"/>

  <!-- ═══════════════ LEFT COLUMN (x: 7–755) ═══════════════ -->

  <!-- ORGANON — font-size 118, safe in ~550px span -->
  <text x="48" y="188"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="118" letter-spacing="-4"
        fill="#1a1320">ORGANON</text>

  <!-- Thin rule under title -->
  <rect x="48" y="208" width="630" height="2" fill="rgba(26,19,32,0.18)"/>

  <!-- Tagline -->
  <text x="50" y="244"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="13" letter-spacing="5"
        fill="#7a6d8a">THE INSTRUMENT OF THOUGHT — ARISTOTLE</text>

  <!-- Description lines -->
  <text x="50" y="294"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="500" font-size="19" fill="#1a1320" opacity="0.72">Local-first semantic layer over your filesystem.</text>
  <text x="50" y="320"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="500" font-size="19" fill="#1a1320" opacity="0.72">Every file becomes a living entity with identity,</text>
  <text x="50" y="346"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="500" font-size="19" fill="#1a1320" opacity="0.72">context, relationships, and a lifecycle.</text>

  <!-- CTA buttons -->
  <rect x="50" y="384" width="212" height="44" fill="#6d28d9"/>
  <text x="156" y="411"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="12" letter-spacing="3.5"
        fill="#f7f4fd" text-anchor="middle">OPEN REPOSITORY</text>

  <rect x="278" y="384" width="170" height="44" fill="none" stroke="rgba(26,19,32,0.82)" stroke-width="1.5"/>
  <text x="363" y="411"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="12" letter-spacing="3.5"
        fill="#1a1320" text-anchor="middle">QUICK START</text>

  <!-- Footer stamps -->
  <text x="50" y="568"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="10" letter-spacing="4"
        fill="rgba(26,19,32,0.28)">LOCAL-FIRST · AGENT-NATIVE · MIT LICENSE · LIFECYCLE-AWARE</text>

  <!-- ═══════════════ RIGHT COLUMN (x: 755–1280) ═══════════════ -->

  <!-- Panel header bar -->
  <rect x="755" y="0" width="525" height="52" fill="#1a1320"/>
  <text x="775" y="33"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="11" letter-spacing="5"
        fill="#a78bfa">ARCHITECTURE FLOW</text>

  <!-- ── Node 1: Filesystem ── -->
  <rect x="775" y="76" width="485" height="76" fill="#ede8f5" stroke="rgba(26,19,32,0.82)" stroke-width="1.5"/>
  <text x="796" y="107"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="15" fill="#1a1320">Your Filesystem</text>
  <text x="796" y="130"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#7a6d8a">Files · directories · raw bytes</text>
  <!-- badge -->
  <rect x="1168" y="86" width="72" height="22" fill="#e0d9ee" stroke="rgba(26,19,32,0.35)" stroke-width="1"/>
  <text x="1204" y="101"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="10" font-weight="700" fill="#7a6d8a" text-anchor="middle">notify</text>

  <!-- arrow down -->
  <line x1="1017" y1="152" x2="1017" y2="176" stroke="#6d28d9" stroke-width="2"/>
  <polygon points="1009,172 1017,188 1025,172" fill="#6d28d9"/>

  <!-- ── Node 2: Organon Core ── -->
  <rect x="775" y="188" width="485" height="104" fill="#6d28d9" stroke="rgba(26,19,32,0.82)" stroke-width="1.5"/>
  <text x="796" y="218"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="15" fill="#f7f4fd">Organon Core</text>
  <text x="796" y="242"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#c4b5fd">Entity graph · Lifecycle engine</text>
  <text x="796" y="262"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="12" fill="#c4b5fd">Semantic search · SQLite + LanceDB</text>
  <!-- badge -->
  <rect x="1152" y="202" width="84" height="22" fill="rgba(255,255,255,0.14)" stroke="rgba(255,255,255,0.28)" stroke-width="1"/>
  <text x="1194" y="217"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="10" font-weight="700" fill="#e0d9ee" text-anchor="middle">Rust + Python</text>

  <!-- arrows split to two nodes -->
  <line x1="930" y1="292" x2="930" y2="316" stroke="#6d28d9" stroke-width="2"/>
  <polygon points="922,312 930,328 938,312" fill="#6d28d9"/>
  <line x1="1102" y1="292" x2="1102" y2="316" stroke="#6d28d9" stroke-width="2"/>
  <polygon points="1094,312 1102,328 1110,312" fill="#6d28d9"/>

  <!-- ── Node 3a: MCP Server ── -->
  <rect x="775" y="328" width="228" height="80" fill="#f7f4fd" stroke="rgba(26,19,32,0.82)" stroke-width="1.5"/>
  <text x="796" y="357"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="14" fill="#1a1320">MCP Server</text>
  <text x="796" y="378"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="11" fill="#7a6d8a">AI agents query</text>
  <text x="796" y="395"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="11" fill="#7a6d8a">your file graph</text>

  <!-- ── Node 3b: CLI ── -->
  <rect x="1032" y="328" width="228" height="80" fill="#f7f4fd" stroke="rgba(26,19,32,0.82)" stroke-width="1.5"/>
  <text x="1052" y="357"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="800" font-size="14" fill="#1a1320">CLI / UI</text>
  <text x="1052" y="378"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="11" fill="#7a6d8a">Humans navigate</text>
  <text x="1052" y="395"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-size="11" fill="#7a6d8a">the living graph</text>

  <!-- ── Lifecycle strip ── -->
  <rect x="775" y="432" width="485" height="40" fill="#1a1320"/>
  <text x="790" y="457"
        font-family="'Space Grotesk','Helvetica Neue',Arial,sans-serif"
        font-weight="700" font-size="10" letter-spacing="2.5"
        fill="#a78bfa">BORN → ACTIVE → DORMANT → ARCHIVED → DEAD</text>

  <!-- Right accent bar -->
  <rect x="1273" y="0" width="7" height="640" fill="rgba(26,19,32,0.10)"/>
</svg>
